<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧪 آزمون عناصر شیمی- ۱۱۸ عنصر</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tahoma', 'Segoe UI', sans-serif;
      direction: rtl;
      text-align: right;
      padding: 12px;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
    }
    h1 { margin: 10px 0; color: #1a3c5e; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
    .card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      margin: 8px auto;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    button {
      padding: 12px 18px;
      margin: 6px 4px;
      border: none;
      border-radius: 25px;
      background: #0d6efd;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.96); background: #0a58ca; }
    button.secondary { background: #6c757d; }
    select, input {
      padding: 12px 14px;
      border-radius: 25px;
      border: 2px solid #dee2e6;
      font-size: 14px;
      margin: 6px 0;
      width: 100%;
      max-width: 350px;
      background: white;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: #0d6efd; outline: none; }
    .checkbox-container { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
    .checkbox-container input[type="checkbox"] { width: 20px; height: 20px; accent-color: #0d6efd; transform: scale(1.1); }
    .timer {
      position: sticky; top: 10px; background: #ffc107; color: #000; padding: 12px; border-radius: 25px;
      text-align: center; font-weight: bold; font-size: 1.1rem; z-index: 100; margin: 10px 0;
      transition: background 0.3s, color 0.3s; animation: pulse 2s infinite;
    }
    .timer.warning { background: #ff9800; color: white; animation: pulse 1s infinite; }
    .timer.danger { background: #f44336; color: white; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%{transform: scale(1);} 50%{transform: scale(1.02);} 100%{transform: scale(1);} }
    .question-block {
      background: #f8fafc; border-radius: 16px; padding: 16px; margin: 14px 0;
      border-right: 5px solid #0d6efd; animation: slideIn 0.4s ease; transition: all 0.3s;
    }
    @keyframes slideIn { from {opacity:0; transform: translateX(15px);} to {opacity:1; transform: translateX(0);} }
    .question-block.disabled { opacity: 0.75; filter: grayscale(0.1); pointer-events: none; }
    .feedback { margin-top: 10px; font-weight: bold; animation: fadeIn 0.4s ease; font-size: 13px; }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    .result { background: #e8f5e9; border-right: 5px solid #4caf50; }
    .table-wrapper { overflow-x: auto; max-height: 65vh; margin: 8px 0; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; }
    th { background: #0d6efd; color: white; padding: 10px; position: sticky; top: 0; z-index: 2; }
    td, th { border: 1px solid #ddd; padding: 8px; text-align: center; }
    tr:nth-child(even) { background: #f2f7ff; }
    .chat-container { background: white; border-radius: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); overflow: hidden; }
    .chat-header { background: #0d6efd; color: white; padding: 14px; text-align: center; font-weight: bold; }
    .chat-messages { height: 320px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
    .message { display: flex; align-items: flex-start; gap: 8px; max-width: 85%; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
    .user-message { align-self: flex-end; flex-direction: row-reverse; }
    .bot-message { align-self: flex-start; }
    .avatar { font-size: 24px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #e9ecef; border-radius: 50%; flex-shrink: 0; }
    .bubble { padding: 10px 14px; border-radius: 18px; background: #f1f1f1; line-height: 1.5; font-size: 13px; }
    .user-message .bubble { background: #e3f2fd; border-bottom-right-radius: 5px; }
    .bot-message .bubble { background: #f1f1f1; border-bottom-left-radius: 5px; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; background: #f9f9f9; gap: 8px; }
    .chat-input input { flex: 1; margin: 0; }
    .send-btn { border-radius: 25px; padding: 10px 14px; font-size: 20px; background: #0d6efd; }
    .level-select { display: flex; align-items: center; gap: 6px; margin: 8px 14px; }
    .level-select select { max-width: 130px; padding: 8px 10px; font-size: 13px; }
    .finish-btn { background: #198754; animation: pulseBtn 1.5s infinite; }
    @keyframes pulseBtn { 0%{box-shadow:0 0 0 0 rgba(25,135,84,0.5);} 70%{box-shadow:0 0 0 10px rgba(25,135,84,0);} 100%{box-shadow:0 0 0 0 rgba(25,135,84,0);} }
    .share-btn { background: #6f42c1; }
    /* Shake animation for wrong answer */
    @keyframes shake { 0%,100%{transform: translateX(0);} 20%{transform: translateX(-5px);} 40%{transform: translateX(5px);} 60%{transform: translateX(-3px);} 80%{transform: translateX(3px);} }
    .shake { animation: shake 0.3s ease; }
    /* Settings panel */
    .settings-overlay {
      display: none;
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5); z-index:200;
      justify-content: center; align-items: center;
    }
    .settings-panel {
      background: white; border-radius: 20px; padding: 20px; width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s;
    }
    .settings-panel h3 { margin-bottom: 15px; }
    .toggle-container { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
    .toggle-switch { position: relative; display: inline-block; width: 50px; height: 28px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background: #ccc; border-radius: 28px; transition: 0.3s; }
    .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #0d6efd; }
    input:checked + .slider:before { transform: translateX(22px); }
    .gear-btn { position: fixed; top: 15px; right: 15px; background: #6c757d; border-radius: 50%; width: 42px; height: 42px; font-size: 22px; display: flex; align-items: center; justify-content: center; z-index: 150; cursor: pointer; border: none; color: white; }
  </style>
</head>
<body>
  <button class="gear-btn" onclick="toggleSettings()">⚙️</button>
  <!-- پنل تنظیمات -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <h3>⚙️ تنظیمات</h3>
      <div class="toggle-container">
        <span>🔊 افکت صوتی</span>
        <label class="toggle-switch">
          <input type="checkbox" id="soundToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-container">
        <span>📳 لرزش</span>
        <label class="toggle-switch">
          <input type="checkbox" id="vibrateToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-container">
        <span>✨ انیمیشن</span>
        <label class="toggle-switch">
          <input type="checkbox" id="animToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <button onclick="saveSettings()" style="width:100%; margin-top:10px;">💾 ذخیره تنظیمات</button>
      <button class="secondary" onclick="toggleSettings()" style="width:100%;">↩️ بازگشت</button>
    </div>
  </div>

  <h1>🧪 آزمون عناصر شیمی (۱۱۸ عنصر)</h1>

  <!-- منوی اصلی -->
  <div class="card" id="menu">
    <label>📊 محدوده عناصر:</label>
    <select id="range">
      <option value="1">🔹 بلوک ۱ (۱ تا ۳۶)</option>
      <option value="2">🔸 بلوک ۲ (۳۷ تا ۷۲)</option>
      <option value="3">🔹 بلوک ۳ (۷۳ تا ۱۰۸)</option>
      <option value="4">🔸 بلوک ۴ (۱۰۹ تا ۱۱۸)</option>
      <option value="all">🌐 کل جدول (۱۱۸ عنصر)</option>
    </select>
    <label>🔢 تعداد سوال:</label>
    <input type="number" id="numQuestions" min="1" max="118" value="10">
    <label>🎯 حالت آزمون:</label>
    <select id="mode">
      <option value="sym2num">🔣 نماد ← عدد اتمی</option>
      <option value="sym2name">🔣 نماد ← نام</option>
      <option value="name2num">📛 نام ← عدد اتمی</option>
      <option value="name2sym">📛 نام ← نماد</option>
      <option value="num2name">🔢 عدد اتمی ← نام</option>
      <option value="num2sym">🔢 عدد اتمی ← نماد</option>
      <option value="mixed">🔀 ترکیبی (همه موارد)</option>
    </select>
    <div class="checkbox-container">
      <input type="checkbox" id="timedQuiz">
      <label>⏳ آزمون زمان‌دار (هر سوال ۲۰ ثانیه)</label>
    </div>
    <button onclick="startQuiz()">🚀 شروع آزمون</button>
    <button class="secondary" onclick="showTable()">📋 مرور جدول کامل</button>
    <button class="secondary" onclick="showChatBot()">🤖 چت‌بات عناصر</button>
  </div>

  <!-- بخش آزمون -->
  <div class="card" id="quizArea" style="display:none;">
    <div id="timer" class="timer" style="display:none;"></div>
    <div id="questionsList"></div>
    <button class="finish-btn" id="finishBtn" onclick="finishQuiz()">🏁 پایان آزمون</button>
    <button class="secondary" onclick="backToMenu()" style="margin-top:12px;">↩️ بازگشت به منو</button>
  </div>

  <!-- بخش نتیجه -->
  <div class="card result" id="resultArea" style="display:none;"></div>

  <!-- جدول مرور -->
  <div class="card" id="tableArea" style="display:none;"></div>

  <!-- چت‌بات -->
  <div class="chat-container card" id="chatArea" style="display:none;">
    <div class="chat-header">🤖 چت‌بات عناصر شیمیایی</div>
    <div class="level-select">
      <label style="font-size:13px;">🎓 سطح پاسخ:</label>
      <select id="chatLevel" onchange="updateChatLevel()">
        <option value="general">عمومی</option>
        <option value="detailed" selected>دقیق</option>
        <option value="expert">تخصصی</option>
      </select>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">
        <div class="avatar">🤖</div>
        <div class="bubble">سلام! عدد اتمی، نماد یا نام یک عنصر را وارد کنید.</div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="عدد اتمی، نماد یا نام...">
      <button class="send-btn" onclick="sendMessage()">⬆️</button>
    </div>
    <button class="secondary" onclick="backToMenu()" style="margin:10px;">↩️ بازگشت</button>
  </div>

<script>
// ======================= آرایه کامل ۱۱۸ عنصر با سه سطح اطلاعاتی =======================
const elements = [

   expert:"هیدروژن (H) با عدد اتمی ۱ و جرم اتمی ۱.۰۰۸، سبک‌ترین عنصر جدول تناوبی است. در دمای اتاق گازی بی‌رنگ و بی‌بوست و به شدت قابل اشتعال. ۷۵٪ جرم جهان را تشکیل می‌دهد و به عنوان سوخت پاک در پیل‌های سوختی استفاده می‌شود."

   expert:"هلیوم (He) با عدد اتمی ۲، کمترین نقطه جوش را دارد و در دمای نزدیک صفر مطلق مایع می‌ماند. در کیهان پس از هیدروژن فراوان‌ترین است و در راکتورهای هسته‌ای به عنوان خنک‌کننده استفاده می‌شود."
  },
  {name:"لیتیم", symbol:"Li", atomic_number:3, type:"فلز قلیایی", mass:6.94,

   detailed:"بریلیم فلزی خاکستری-فولادی، سمی است. در هوافضا، راکتورهای هسته‌ای و ابزار دقیق کاربرد دارد.",
   expert:"بریلیم (Be) با عدد اتمی ۴، سبک‌ترین فلز قلیایی خاکی با نقطه ذوب بالا و رسانایی گرمایی عالی. در آینه‌های تلسکوپ فضایی جیمز وب و پنجره‌های اشعه ایکس استفاده می‌شود."

let settings = {
  sound: true,
  vibrate: true,
  animations: true
};
const savedSettings = localStorage.getItem('quizSettings');
if (savedSettings) { try { settings = JSON.parse(savedSettings); } catch(e) {} }
document.getElementById('soundToggle').checked = settings.sound;
document.getElementById('vibrateToggle').checked = settings.vibrate;
document.getElementById('animToggle').checked = settings.animations;

function toggleSettings() {
  const overlay = document.getElementById('settingsOverlay');
  if (overlay.style.display === 'flex') {
    overlay.style.display = 'none';
  } else {
    document.getElementById('soundToggle').checked = settings.sound;
    document.getElementById('vibrateToggle').checked = settings.vibrate;
    document.getElementById('animToggle').checked = settings.animations;
    overlay.style.display = 'flex';
  }
}

function saveSettings() {
  settings.sound = document.getElementById('soundToggle').checked;
  settings.vibrate = document.getElementById('vibrateToggle').checked;
  settings.animations = document.getElementById('animToggle').checked;
  localStorage.setItem('quizSettings', JSON.stringify(settings));
  toggleSettings();
}

function applyAnimation(el, animClass) {
  if (settings.animations) {
    el.classList.add(animClass);
    setTimeout(() => el.classList.remove(animClass), 400);
  }
}

// ======================= ابزارهای کمکی =======================
function normalizePersian(str) {
  return str.trim().replace(/\s+/g, ' ').replace(/ي/g, 'ی').replace(/ك/g, 'ک').replace(/\u200c/g, '').toLowerCase();
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for(let i=0; i<=m; i++) dp[i][0] = i;
  for(let j=0; j<=n; j++) dp[0][j] = j;
  for(let i=1; i<=m; i++){
    for(let j=1; j<=n; j++){
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ======================= افکت‌های صوتی و لرزش =======================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type = 'sine') {
  if (!settings.sound) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playCorrectSound() { playTone(880, 0.1, "sine"); }
function playWrongSound() { playTone(220, 0.2, "sawtooth"); }
function playFinishSound() {
  playTone(523, 0.15); setTimeout(() => playTone(659, 0.15), 150); setTimeout(() => playTone(784, 0.2), 300);
}

// مدیریت لرزش نتیجه
let vibrationInterval = null;
let vibrationTimeout = null;

function stopResultVibration() {
  if (vibrationInterval) clearInterval(vibrationInterval);
  vibrationInterval = null;
  if (vibrationTimeout) clearTimeout(vibrationTimeout);
  vibrationTimeout = null;
  if (navigator.vibrate) navigator.vibrate(0);
}

function startResultVibration(score20) {
  if (!settings.vibrate || !navigator.vibrate) return;
  stopResultVibration();

  let pattern = [];
  if (score20 >= 18) {
    // عالی: بلند و کوتاه ممتد
    pattern = [600, 200, 300, 200];
  } else if (score20 >= 15) {
    // خوب: متوسط
    pattern = [400, 200];
  } else if (score20 >= 10) {
    // متوسط: کوتاه
    pattern = [200, 300];
  } else {
    // نیاز به تمرین: یکسره ۲۰ ثانیه
    navigator.vibrate(20000);
    vibrationTimeout = setTimeout(() => navigator.vibrate(0), 20000);
    return;
  }

  const cycleTime = pattern.reduce((a,b) => a+b, 0);
  navigator.vibrate(pattern);
  vibrationInterval = setInterval(() => {
    navigator.vibrate(pattern);
  }, cycleTime);

  vibrationTimeout = setTimeout(() => {
    stopResultVibration();
  }, 20000);
}

// توقف لرزش با خروج از صفحه
window.addEventListener('beforeunload', stopResultVibration);
window.addEventListener('visibilitychange', () => {
  if (document.hidden) stopResultVibration();
});

// ======================= متغیرهای آزمون =======================
let quiz = [];
let timeLeft = 0, totalTime = 0, timerInterval = null, quizEnded = false, warningBeeped = false;
let currentChatLevel = 'detailed';

// ======================= توابع اصلی =======================
function startQuiz() {
  clearInterval(timerInterval);
  timerInterval = null;
  quizEnded = false;
  warningBeeped = false;
  stopResultVibration();
  if (settings.sound) playTone(660, 0.1, "triangle");

  document.getElementById("menu").style.display = "none";
  document.getElementById("tableArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("chatArea").style.display = "none";
  const quizArea = document.getElementById("quizArea");
  quizArea.style.display = "block";
  document.getElementById("questionsList").innerHTML = "";

  const rangeVal = document.getElementById("range").value;
  const numQ = parseInt(document.getElementById("numQuestions").value);
  const modeVal = document.getElementById("mode").value;
  const isTimed = document.getElementById("timedQuiz").checked;

  let pool;
  if (rangeVal === "all") {
    pool = elements;
  } else {
    const block = parseInt(rangeVal);
    const start = (block - 1) * 36;
    const end = Math.min(start + 36, elements.length);
    pool = elements.slice(start, end);
  }

  const shuffled = shuffle([...pool]);
  quiz = shuffled.slice(0, numQ).map(elem => {
    let qMode = modeVal;
    if (modeVal === "mixed") {
      const modes = ["sym2num", "sym2name", "name2num", "name2sym", "num2name", "num2sym"];
      qMode = modes[Math.floor(Math.random() * modes.length)];
    }
    return { element: elem, mode: qMode, answered: false, correct: false };
  });

  renderAllQuestions();

  if (isTimed) {
    totalTime = numQ * 20;
    timeLeft = totalTime;
    document.getElementById("timer").style.display = "block";
    document.getElementById("timer").className = "timer";
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
    }, 1000);
  } else {
    document.getElementById("timer").style.display = "none";
  }
}

function renderAllQuestions() {
  const container = document.getElementById("questionsList");
  container.innerHTML = "";
  quiz.forEach((q, idx) => {
    const elem = q.element;
    let questionText = "", inputHTML = "";
    switch (q.mode) {
      case "sym2num":
        questionText = `🔣 نماد: <b>${elem.symbol}</b> → عدد اتمی؟`;
        inputHTML = `<input type="number" id="ans_${idx}" placeholder="عدد اتمی">`;
        break;
      case "sym2name":
        questionText = `🔣 نماد: <b>${elem.symbol}</b> → نام؟`;
        inputHTML = `<input type="text" id="ans_${idx}" placeholder="نام عنصر">`;
        break;
      case "name2num":
        questionText = `📛 نام: <b>${elem.name}</b> → عدد اتمی؟`;
        inputHTML = `<input type="number" id="ans_${idx}" placeholder="عدد اتمی">`;
        break;
      case "name2sym":
        questionText = `📛 نام: <b>${elem.name}</b> → نماد؟`;
        inputHTML = `<input type="text" id="ans_${idx}" placeholder="نماد شیمیایی">`;
        break;
      case "num2name":
        questionText = `🔢 عدد اتمی: <b>${elem.atomic_number}</b> → نام؟`;
        inputHTML = `<input type="text" id="ans_${idx}" placeholder="نام عنصر">`;
        break;
      case "num2sym":
        questionText = `🔢 عدد اتمی: <b>${elem.atomic_number}</b> → نماد؟`;
        inputHTML = `<input type="text" id="ans_${idx}" placeholder="نماد شیمیایی">`;
        break;
    }
    const qDiv = document.createElement("div");
    qDiv.className = "question-block";
    qDiv.id = `qblock_${idx}`;
    qDiv.innerHTML = `
      <p><b>سوال ${idx+1}:</b><br>${questionText}</p>
      <div>${inputHTML}</div>
      <div class="feedback" id="feedback_${idx}"></div>
    `;
    container.appendChild(qDiv);
  });
}

function finishQuiz() {
  if (quizEnded) return;
  if (settings.sound) playFinishSound();
  clearInterval(timerInterval);
  quizEnded = true;
  document.getElementById("timer").style.display = "none";

  let score = 0;
  quiz.forEach((q, idx) => {
    if (q.answered) return;
    const inputEl = document.getElementById(`ans_${idx}`);
    const answer = inputEl ? inputEl.value.trim() : "";
    let isCorrect = false, correctDisplay = "";
    switch (q.mode) {
      case "sym2num":
      case "name2num":
        isCorrect = (parseInt(answer) === q.element.atomic_number);
        correctDisplay = q.element.atomic_number.toString();
        break;
      case "sym2name":
      case "num2name": {
        const nA = normalizePersian(answer), nC = normalizePersian(q.element.name);
        isCorrect = (nA === nC || levenshtein(nA, nC) <= 2);
        correctDisplay = q.element.name;
        break;
      }
      case "name2sym":
      case "num2sym":
        isCorrect = (answer.toUpperCase() === q.element.symbol.toUpperCase());
        correctDisplay = q.element.symbol;
        break;
    }
    q.answered = true;
    q.correct = isCorrect;
    if (isCorrect) score++;

    const fb = document.getElementById(`feedback_${idx}`);
    if (fb) {
      fb.innerHTML = isCorrect ? "✅ درست" : `❌ پاسخ صحیح: ${correctDisplay}`;
      fb.style.color = isCorrect ? "green" : "red";
    }
    if (inputEl) inputEl.disabled = true;
    document.getElementById(`qblock_${idx}`).classList.add("disabled");

    if (isCorrect) {
      if (settings.sound) playCorrectSound();
    } else {
      if (settings.sound) playWrongSound();
      if (settings.vibrate && navigator.vibrate) navigator.vibrate(200);
      const qb = document.getElementById(`qblock_${idx}`);
      applyAnimation(qb, 'shake');
    }
  });

  showResult(score);
}

function showResult(score) {
  const resultDiv = document.getElementById("resultArea");
  resultDiv.style.display = "block";

  const total = quiz.length;
  const score20 = Math.round((score / total) * 20);
  let status = '';
  if (score20 >= 18) status = 'عالی 🌟';
  else if (score20 >= 15) status = 'خوب 👍';
  else if (score20 >= 10) status = 'متوسط 😐';
  else status = 'نیاز به تمرین 📚';

  const shareText = `من در یک آزمون شامل ${total} سوال از عناصر جدول تناوبی شرکت کردم و نمره "${score20}" از ۲۰ را دریافت کردم؛ وضعیت من "${status}" است.`;

  resultDiv.innerHTML = `
    <h3>🎉 آزمون پایان یافت</h3>
    <p style="font-size:1.1rem;">📊 امتیاز شما: <b>${score20} از ۲۰</b> (${score} پاسخ صحیح از ${total})</p>
    <p>وضعیت: <b>${status}</b></p>
    <button onclick="backToMenu()">↩️ بازگشت به منو</button>
    <button class="share-btn" onclick="copyResult()">📤 کپی نتیجه</button>
  `;
  document.getElementById("quizArea").style.display = "none";

  // ذخیره متن برای کپی
  window.shareText = shareText;

  // شروع لرزش نمره
  startResultVibration(score20);
}

function copyResult() {
  if (window.shareText) {
    navigator.clipboard.writeText(window.shareText).then(() => alert('نتیجه در کلیپ‌بورد کپی شد.'));
  }
}

function updateTimerDisplay() {
  const timerEl = document.getElementById("timer");
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  timerEl.textContent = `⏳ ${mins}:${secs.toString().padStart(2,'0')}`;
  timerEl.classList.remove("warning", "danger");
  if (timeLeft <= totalTime * 0.3) {
    timerEl.classList.add("danger");
    if (!warningBeeped) { if (settings.sound) playTone(1000, 0.12, "square"); warningBeeped = true; }
  } else if (timeLeft <= totalTime * 0.6) {
    timerEl.classList.add("warning");
  }
}

// ======================= مرور جدول =======================
function showTable() {
  hideAll();
  document.getElementById("tableArea").style.display = "block";
  let html = "<h3>📋 جدول تناوبی (۱۱۸ عنصر)</h3><div class='table-wrapper'><table>";
  html += "<tr><th>عدد اتمی</th><th>نماد</th><th>نام</th><th>نوع</th></tr>";
  elements.forEach(e => {
    html += `<tr><td>${e.atomic_number}</td><td>${e.symbol}</td><td>${e.name}</td><td>${e.type || ''}</td></tr>`;
  });
  html += "</table></div><br><button onclick='backToMenu()'>↩️ بازگشت</button>";
  document.getElementById("tableArea").innerHTML = html;
}

// ======================= چت‌بات =======================
function showChatBot() {
  hideAll();
  document.getElementById("chatArea").style.display = "block";
  document.getElementById("chatMessages").innerHTML = `
    <div class="message bot-message">
      <div class="avatar">🤖</div>
      <div class="bubble">سلام! عدد اتمی، نماد یا نام یک عنصر را وارد کنید.</div>
    </div>`;
}
function updateChatLevel() { currentChatLevel = document.getElementById("chatLevel").value; }
function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  processUserInput(text);
  input.value = "";
}
function addMessage(txt, sender) {
  const msgDiv = document.createElement("div");
  msgDiv.className = `message ${sender}-message`;
  msgDiv.innerHTML = `<div class="avatar">${sender === 'user' ? '🧑🏻‍🏫' : '🤖'}</div><div class="bubble">${txt}</div>`;
  document.getElementById("chatMessages").appendChild(msgDiv);
  document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
}
function processUserInput(input) {
  let response = "😕 متوجه نشدم. عدد اتمی (۱-۱۱۸)، نماد یا نام فارسی عنصر را وارد کنید.";
  if (!isNaN(input)) {
    const num = parseInt(input);
    const elem = elements.find(e => e.atomic_number === num);
    if (elem) response = generateResponse(elem);
    else response = "❌ عدد اتمی باید بین ۱ تا ۱۱۸ باشد.";
  } else if (/^[A-Za-z]{1,2}$/.test(input)) {
    const sym = input.charAt(0).toUpperCase() + input.slice(1).toLowerCase();
    const elem = elements.find(e => e.symbol === sym);
    if (elem) response = generateResponse(elem);
    else response = "❌ نماد معتبر نیست.";
  } else {
    const normInput = normalizePersian(input);
    let best = null, minDist = Infinity;
    elements.forEach(e => {
      const dist = levenshtein(normInput, normalizePersian(e.name));
      if (dist < minDist) { minDist = dist; best = e; }
    });
    if (best && minDist <= 3) response = generateResponse(best);
    else response = "❌ نام عنصر تشخیص داده نشد.";
  }
  setTimeout(() => addMessage(response, 'bot'), 500);
}
function generateResponse(elem) {
  switch (currentChatLevel) {
    case 'general':
      return `🔹 ${elem.name} (${elem.symbol}) – عدد اتمی ${elem.atomic_number}\n${elem.general || elem.detailed}`;
    case 'expert':
      return `🔬 ${elem.name} (${elem.symbol}) – عدد اتمی ${elem.atomic_number}، جرم اتمی ${elem.mass} u\n${elem.expert || elem.detailed}`;
    default:
      return `📘 ${elem.name} (${elem.symbol}) – عدد اتمی ${elem.atomic_number}\n${elem.detailed || elem.general}`;
  }
}

// ======================= مدیریت نمایش =======================
function hideAll() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("tableArea").style.display = "none";
  document.getElementById("chatArea").style.display = "none";
  clearInterval(timerInterval);
  timerInterval = null;
}

function backToMenu() {
  clearInterval(timerInterval);
  timerInterval = null;
  quizEnded = true;
  stopResultVibration();
  document.getElementById("menu").style.display = "block";
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("tableArea").style.display = "none";
  document.getElementById("chatArea").style.display = "none";
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") { e.preventDefault(); sendMessage(); }
});

window.onclick = function(event) {
  if (event.target === document.getElementById('settingsOverlay')) {
    document.getElementById('settingsOverlay').style.display = 'none';
  }
};
</script>
